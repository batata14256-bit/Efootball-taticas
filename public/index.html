<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Táticas IA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ eFootball Táticas IA</h1>
            <p class="subtitle">Gere táticas históricas para seu time automaticamente</p>
        </header>

        <main>
            <div class="form-section" id="formSection">
                <h2>Preencha os dados do seu time</h2>
                <form id="tacticForm">
                    <div class="form-group">
                        <label for="teamName">Nome do Time:</label>
                        <input type="text" id="teamName" placeholder="Ex: Manchester United, Barcelona..." required>
                    </div>

                    <div class="form-group">
                        <label for="year">Ano:</label>
                        <input type="number" id="year" placeholder="Ex: 2023" min="1900" max="2024" required>
                    </div>

                    <button type="submit" class="btn-generate">🤖 Gerar Tática</button>
                </form>
            </div>

            <div class="results-section" id="resultsSection" style="display: none;">
                <h2>Tática Gerada</h2>
                <div class="tactic-card" id="tacticResult"></div>
                <button class="btn-secondary" onclick="resetForm()">← Voltar</button>
            </div>

            <div id="loadingSpinner" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Gerando tática com IA...</p>
            </div>
        </main>

        <footer>
            <p>© 2024 eFootball Táticas IA | Táticas históricas para eFootball</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
